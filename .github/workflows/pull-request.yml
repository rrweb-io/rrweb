name: Pull Request

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    permissions:
      contents: read
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version-file: .nvmrc

      - name: Upgrade npm
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci --ignore-scripts
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'

      - name: Read Puppeteer browser revision
        id: puppeteer-browser
        run: |
          revision=$(node -p "require('./.puppeteerrc.cjs').browserRevision")
          echo "revision=${revision}" >> "$GITHUB_OUTPUT"

      - name: Setup Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@2e1d749697dd1612b833dba4a722266286fbefcd # v2.1.2
        with:
          chrome-version: ${{ steps.puppeteer-browser.outputs.revision }}

      - name: Install Playwright browsers
        run: npx playwright install chromium
        timeout-minutes: 5

      - name: Build
        run: npm run build:all

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run check-types

      - name: Unit tests
        run: npm test
        env:
          PUPPETEER_HEADLESS: 'true'
          PUPPETEER_EXECUTABLE_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
