name: Release

on:
  workflow_dispatch:
    inputs:
      releaseType:
        type: choice
        description: 'release (master), prerelease (alpha), or dry-run (no push, any branch)'
        required: true
        default: dry-run
        options:
          - release
          - prerelease
          - dry-run
      skipVersion:
        type: boolean
        description: 'Skip the lerna version step and only publish (recovery for a partial publish where the tag/commit already landed)'
        required: false
        default: false

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  authorize:
    name: Authorize
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch for release type
        env:
          RELEASE_TYPE: ${{ github.event.inputs.releaseType }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          case "$RELEASE_TYPE" in
            release)
              if [ "$REF_NAME" != "master" ]; then
                echo "release must run from master (current: $REF_NAME)"; exit 1
              fi
              ;;
            prerelease)
              if [ "$REF_NAME" != "alpha" ]; then
                echo "prerelease must run from alpha (current: $REF_NAME)"; exit 1
              fi
              ;;
            dry-run)
              echo "dry-run on $REF_NAME"
              ;;
          esac

      - name: ${{ github.actor }} permission check to do a release
        uses: lannonbr/repo-permission-check-action@2bb8c89ba8bf115c4bfab344d6a6f442b24c9a1f # 2.0.2
        with:
          permission: write
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [authorize]
    environment: npm-release
    permissions:
      id-token: write # Required for OIDC
      contents: write
    env:
      GIT_AUTHOR_NAME: amplitude-sdk-bot
      GIT_AUTHOR_EMAIL: amplitude-sdk-bot@users.noreply.github.com
      GIT_COMMITTER_NAME: amplitude-sdk-bot
      GIT_COMMITTER_EMAIL: amplitude-sdk-bot@users.noreply.github.com
    steps:
      - name: Checkout Repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - name: Install pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0

      - name: Setup Node.js 24.x
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24.x
          cache: 'pnpm'
          # Intentionally no registry-url: setup-node writes an .npmrc with
          # `_authToken=${NODE_AUTH_TOKEN}` when that's set, which causes npm
          # to use that token instead of attempting OIDC trusted publishing.
          # OIDC trusted publishing is configured npm-side for this workflow
          # (SR-3110, PR #89) and is the only auth path we want.

      - name: Upgrade npm for OIDC support
        run: npm install -g npm@latest

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile
        env:
          PUPPETEER_SKIP_DOWNLOAD: true
          # Playwright 1.44.1 defaults to the retired playwright.azureedge.net
          # CDN, which hangs/stalls on download. Point at the current Microsoft
          # CDN, which serves the same /builds/<browser>/<rev>/... layout.
          PLAYWRIGHT_DOWNLOAD_HOST: https://cdn.playwright.dev/dbazure/download/playwright

      - name: Build packages
        run: pnpm build:all
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Run tests
        # Gate publish on tests passing. Skipped for dry-run since dry-run
        # is just a version-bump preview, not an actual release.
        if: ${{ github.event.inputs.releaseType != 'dry-run' }}
        run: pnpm test

      - name: Reset working tree
        # Build prepublish hooks mutate tracked files (tsconfig project references).
        # Reset so `lerna version` doesn't fold them into the release commit and
        # so `lerna publish from-git` (used by skipVersion recovery) sees a clean tree.
        # dist/ outputs are gitignored and survive the reset.
        run: git checkout HEAD -- .

      - name: Version (release)
        if: ${{ github.event.inputs.releaseType == 'release' && github.event.inputs.skipVersion != 'true' }}
        run: pnpm release:version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Version (prerelease)
        if: ${{ github.event.inputs.releaseType == 'prerelease' && github.event.inputs.skipVersion != 'true' }}
        run: pnpm release:version:prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Version (dry-run)
        if: ${{ github.event.inputs.releaseType == 'dry-run' }}
        run: pnpm release:version:dry-run

      # Publish via the npm CLI directly rather than `lerna publish`, because
      # lerna 8.2.4 bundles libnpmpublish 9.x which only supports OIDC for
      # provenance generation, not for trusted-publisher auth (added in
      # libnpmpublish 11.x and shipped with npm 11.5.1+). The npm CLI installed
      # by "Upgrade npm for OIDC support" above has the full OIDC auth flow.
      # We still use `lerna list` for topological ordering across the workspace.
      - name: Publish (release)
        if: ${{ github.event.inputs.releaseType == 'release' }}
        run: bash scripts/publish-packages.sh
        env:
          NPM_CONFIG_PROVENANCE: 'true'

      - name: Publish (prerelease)
        if: ${{ github.event.inputs.releaseType == 'prerelease' }}
        run: bash scripts/publish-packages.sh alpha
        env:
          NPM_CONFIG_PROVENANCE: 'true'
