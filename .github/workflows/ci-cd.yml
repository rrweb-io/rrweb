name: Tests

on:
  push:
    paths-ignore:
      - '**/*.md'
  pull_request:
    paths-ignore:
      - '**/*.md'

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Tests
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3
        with:
          # This makes Actions fetch all Git history so that Changesets can generate changelogs with the correct commits
          fetch-depth: 0

      - name: Setup Node.js lts/*
        uses: actions/setup-node@v3
        with:
          node-version: lts/*
          cache: 'yarn'

      - name: Install Dependencies
        run: yarn install --frozen-lockfile
        env:
          PUPPETEER_SKIP_DOWNLOAD: true
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: true
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: true

      - name: Build Project
        run: NODE_OPTIONS='--max-old-space-size=4096' yarn build:all

      - name: Read Puppeteer browser revision
        id: puppeteer-browser
        run: |
          echo "revision=$(node -p "require('./.puppeteerrc.cjs').browserRevision")" >> "$GITHUB_OUTPUT"

      - name: Setup Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: ${{ steps.puppeteer-browser.outputs.revision }}

      - name: Install Playwright system dependencies
        run: |
          cd packages/rrvideo
          yarn playwright install-deps chromium
          sudo apt-get install -y ffmpeg
          ffmpeg_path="$(node - <<'NODE'
          const path = require('path');
          const registryPath = path.join(
            path.dirname(require.resolve('playwright-core/package.json')),
            'lib/server/registry/index.js',
          );
          const { registry } = require(registryPath);
          console.log(registry.findExecutable('ffmpeg').executablePath());
          NODE
          )"
          mkdir -p "$(dirname "$ffmpeg_path")"
          ln -sf "$(command -v ffmpeg)" "$ffmpeg_path"

      - name: Check types
        run: yarn check-types

      - name: Run tests
        # run: PUPPETEER_EXECUTABLE_PATH=${{ steps.setup-chrome.outputs.chrome-path }} PUPPETEER_HEADLESS=true xvfb-run --server-args="-screen 0 1920x1080x24" yarn test
        run: PUPPETEER_EXECUTABLE_PATH=${{ steps.setup-chrome.outputs.chrome-path }} PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH=${{ steps.setup-chrome.outputs.chrome-path }} PUPPETEER_HEADLESS=true xvfb-run --server-args="-screen 0 1920x1080x24" yarn test

      - name: Upload diff images to GitHub
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: image-diff
          path: packages/**/__image_snapshots__/__diff_output__/*.png
          if-no-files-found: ignore
