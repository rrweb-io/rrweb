name: ESLint Check

on:
  push:
  pull_request:

jobs:
  eslint_check_upload:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    name: ESLint Check and Report Upload

    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.head_ref }}
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: lts/*
          cache: 'yarn'
      - name: Install Dependencies
        run: yarn install --frozen-lockfile
        env:
          PUPPETEER_SKIP_DOWNLOAD: true
      - name: Build Packages
        run: NODE_OPTIONS='--max-old-space-size=4096' yarn build:all
      - name: Eslint Check
        run: yarn turbo run lint
      - name: Save Code Linting Report JSON
        run: yarn lint:report
        # Continue to the next step even if this fails
        continue-on-error: true
      - name: Upload ESLint Report
        uses: actions/upload-artifact@v4
        with:
          name: eslint_report.json
          path: eslint_report.json
      - name: Measure PR bundle sizes
        if: github.event_name == 'pull_request'
        run: |
          node -e "
          const fs = require('fs'), path = require('path');
          function walk(dir, out = {}) {
            if (/node_modules/.test(dir)) return out;
            for (const e of fs.readdirSync(dir, { withFileTypes: true })) {
              const p = path.join(dir, e.name);
              if (e.isDirectory()) walk(p, out);
              else if (/\/dist\/[^/]+\.(js|cjs|mjs|css)$/.test(p) && !p.includes('packages/packer/dist/'))
                out[p.replace(/^\.\//, '')] = fs.statSync(p).size;
            }
            return out;
          }
          fs.writeFileSync('pr-sizes.json', JSON.stringify(walk('.'), null, 2));
          "
      - name: Upload PR bundle sizes
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: pr-sizes
          path: pr-sizes.json

  bundle_size_build:
    # Only runs on PRs. Reuses the PR build from eslint_check_upload (via the
    # pr-sizes artifact) and only builds the base branch itself. The privileged
    # bundle-size-comment workflow then posts the PR comment without ever
    # executing fork code.
    if: github.event_name == 'pull_request'
    needs: eslint_check_upload
    runs-on: ubuntu-latest
    permissions:
      contents: read
    name: Build Base for Bundle Size Comparison
    steps:
      - name: Write size measurement script
        run: |
          cat > /tmp/measure-sizes.js << 'EOF'
          const fs = require('fs'), path = require('path');
          function walk(dir, out = {}) {
            if (/node_modules/.test(dir)) return out;
            for (const e of fs.readdirSync(dir, { withFileTypes: true })) {
              const p = path.join(dir, e.name);
              if (e.isDirectory()) walk(p, out);
              else if (/\/dist\/[^/]+\.(js|cjs|mjs|css)$/.test(p) && !p.includes('packages/packer/dist/'))
                out[p.replace(/^\.\//, '')] = fs.statSync(p).size;
            }
            return out;
          }
          fs.writeFileSync(process.argv[2], JSON.stringify(walk('.'), null, 2));
          EOF


      # --- Base branch ---
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}

      - name: Download PR bundle sizes
        uses: actions/download-artifact@v4
        with:
          name: pr-sizes

      - uses: actions/setup-node@v3
        with:
          node-version: lts/*
          cache: 'yarn'
      - name: Install base dependencies
        run: yarn install --frozen-lockfile
        env:
          PUPPETEER_SKIP_DOWNLOAD: true
      - name: Build base branch
        run: NODE_OPTIONS='--max-old-space-size=4096' yarn build:all
        env:
          PUPPETEER_SKIP_DOWNLOAD: true
      - name: Measure base bundle sizes
        run: node /tmp/measure-sizes.js base-sizes.json

      - name: Save PR number
        run: echo "${{ github.event.pull_request.number }}" > pr_number.txt

      - uses: actions/upload-artifact@v4
        with:
          name: bundle-size-data
          path: |
            pr-sizes.json
            base-sizes.json
            pr_number.txt
